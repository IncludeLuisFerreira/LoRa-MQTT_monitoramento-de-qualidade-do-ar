services:
  mosquitto:
    image: eclipse-mosquitto:2.0.15
    container_name: airsense-broker
    ports:
      - "1883:1883"    # MQTT
      - "9001:9001"    # WebSocket (opcional)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - airsense-net
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: airsense-influx
    ports:
      - "8086:8086"
    environment:
    - DOCKER_INFLUXDB_INIT_MODE=setup
    - DOCKER_INFLUXDB_INIT_USERNAME=admin
    - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
    - DOCKER_INFLUXDB_INIT_ORG=airsense
    - DOCKER_INFLUXDB_INIT_BUCKET=airsense
    volumes:
      - influx_data:/var/lib/influxdb2
    networks:
      - airsense-net

volumes:
  mosquitto_data:
  mosquitto_logs:
  influx_data:

networks:
  airsense-net:
    driver: bridge
