[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "airsense-token-2026"
  organization = "airsense-org"
  bucket = "airsense-bucket"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "airsense/+/decoded",
    "airsense/+/status"
  ]
  data_format = "json"
  json_string_fields = ["gateway_id", "status"]
  tag_keys = ["gateway_id", "sensor_id"]

# Processamento para extrair campos do TpM decodificado pelo gateway
# O gateway já envia um JSON. O Telegraf pode usar processadores se necessário,
# mas o PRD diz que o Telegraf consome o JSON do gateway.
# No entanto, o JSON do gateway tem o payload em Base64.
# O PRD diz: "O Telegraf deve ser o único componente a escrever no InfluxDB" (RF-DB-03).
# Para o Telegraf decodificar o TpM, ele precisaria de um script ou plugin.
# Alternativamente, o Border poderia publicar dados já decodificados em um tópico 
# que o Telegraf escuta.
# PRD 7.1 diz: "Telegraf Consome JSON -> InfluxDB". 
# Olhando o trecho do telegraf.conf no Anexo D, ele apenas pega o JSON.
# Para manter a fidelidade ao PRD, vou assumir que o Telegraf consome o JSON 
# enviado pelo gateway ou que o gateway envia dados já mastigados.
# Mas o Gateway envia "tpm" com payload_hex.
# Vou adicionar um tópico onde o Border publica dados decodificados especificamente para o Telegraf.
# Tópico: airsense/{gw_id}/data
