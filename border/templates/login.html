<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSense v3.0 - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; margin: auto; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center mb-4">AirSense v3.0</h2>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Perfil</label>
                <select name="role" class="form-select">
                    <option value="admin">Administrador</option>
                    <option value="user">Usuário Comum</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar no Sistema</button>
        </form>
        <p class="mt-3 text-muted text-center" style="font-size: 0.8rem;">Credenciais de dev: admin/admin123 ou user/user123</p>
    </div>
</body>
</html>
